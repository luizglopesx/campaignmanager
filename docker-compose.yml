version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: campaign-manager-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-campaign_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-campaign_pass_2026}
      POSTGRES_DB: ${DB_NAME:-campaign_manager}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-campaign_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: campaign-manager-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
